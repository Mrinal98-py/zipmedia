# ─── Nginx reverse-proxy config for ZipMedia ─────────────────────────────────
# Place at: /etc/nginx/sites-available/zipmedia
# Enable:   sudo ln -s /etc/nginx/sites-available/zipmedia /etc/nginx/sites-enabled/
# Test:     sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone — 10 req/s per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP → HTTPS (uncomment after adding SSL cert)
    # return 301 https://$host$request_uri;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Cache static assets ────────────────────────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|ico|png|jpg|webp|svg)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # ── Health check (no rate limit) ───────────────────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ── Main app ───────────────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_read_timeout  60s;
    }
}

